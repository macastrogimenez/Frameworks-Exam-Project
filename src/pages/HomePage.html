<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Body is Tee</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="../js/products.js"></script>
</head>

<body>
    <div id="navbar"></div>
    <script>
        function includeHTML(elementId, file) {
            fetch(file)
                .then(response => response.text())
                .then(data => {
                    document.getElementById(elementId).innerHTML = data;
                });
        }
        includeHTML('navbar', 'NavigationBar.html');
    </script>
    <main>
        <section class="py-5 bg-light">
            <div class="container">
                <h2 class="text-center mb-4">New arrivals</h2>
                <div class="row" id="newArrivalsContainer">
                </div>
            </div>
        </section>

        <section class="offers py-5 bg-light">
            <div class="container">
                <h2 class="text-center mb-4">Discounts</h2>
                <div class="row" id="discountsContainer">
                </div>
            </div>
        </section>

    </main>

    <script src="../js/HomePage.js"></script>
</body>

</html>
