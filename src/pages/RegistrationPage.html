<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../css/RegistrationPage.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
    <title>Registration</title>
    <script src="../js/NavigationBar.js"></script>
</head>

<body>
    <div id="navbar"></div>
    <div class="container d-flex justify-content-center align-items-center min-vh-100 py-4">
        <div class="card border-0 shadow-sm p-4" style="width:100%; max-width:420px;">
            <h3 class="mb-4 text-center">Create Account</h3>
            <form onsubmit="store(event)">
                <div class="mb-3">
                    <label for="fname">First name:</label>
                    <input type="text" id="fname" name="fname" class="form-control" required />
                </div>
                <div class="mb-3">
                    <label for="lname">Last name:</label>
                    <input type="text" id="lname" name="lname" class="form-control" required />
                </div>
                <div class="mb-3">
                    <label for="username">Username:</label>
                    <input type="text" id="username" name="username" class="form-control" required />
                </div>
                <div class="mb-3">
                    <label for="password">Password:</label>
                    <input type="password" id="password" name="password" class="form-control" required />
                </div>
                <div class="mb-3">
                    <label for="confirmPassword">Confirm Password:</label>
                    <input type="password" id="confirmPassword" class="form-control" />
                </div>
                <input class="btn btn-dark w-100 mb-2" type="submit" value="Register" />
                <input type="button" class="btn btn-dark w-100 mb-2" value="Cancel" onclick="history.back()" />
                <p class="text-center mt-3">
                    Already have an account?
                    <a href="LoginPage.html">Login here</a>
                </p>
            </form>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
        integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
        crossorigin="anonymous"></script>
    <script src="../js/RegistrationPage.js"></script>
</body>

</html>
